<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WikiLeaks Network Visualization - 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; 
      color: #fff;
      overflow: hidden;
    }
    #container { width: 100vw; height: 100vh; }
    
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(20, 20, 30, 0.95);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 320px;
    }
    
    .controls h1 { font-size: 18px; margin-bottom: 15px; color: #00ff88; }
    .controls h2 {
      font-size: 14px;
      margin: 15px 0 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      background: #2a2a3a;
      color: #fff;
    }
    
    .btn:hover { background: #3a3a4a; }
    .btn.active { background: #00ff88; color: #000; }
    
    .stats {
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.8;
    }
    
    .stats span { color: #00ff88; font-weight: bold; }
    
    .info-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 20, 30, 0.95);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 400px;
      max-height: 60vh;
      overflow-y: auto;
      display: none;
    }
    
    .info-panel h3 { color: #00ff88; margin-bottom: 10px; font-size: 16px; }
    .info-panel p { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 15px; }
    
    .info-panel .close {
      position: absolute;
      top: 12px;
      right: 15px;
      cursor: pointer;
      color: #666;
      font-size: 20px;
    }
    
    .info-panel .close:hover { color: #fff; }
    
    .doc-link {
      display: block;
      padding: 12px;
      background: rgba(0,255,136,0.1);
      border-radius: 8px;
      color: #00ff88;
      text-decoration: none;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      border: 1px solid rgba(0,255,136,0.2);
    }
    
    .doc-link:hover { background: rgba(0,255,136,0.2); }
    
    .legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(20, 20, 30, 0.95);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
    }
    
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .legend-color { width: 12px; height: 12px; border-radius: 50%; }
    
    .search-box { margin-top: 15px; }
    
    .search-box input {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
    }
    
    .search-box input::placeholder { color: #666; }
    .search-box input:focus { outline: none; border-color: #00ff88; }
    
    .advanced-link {
      display: block;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,255,136,0.1);
      border-radius: 6px;
      color: #00ff88;
      text-decoration: none;
      text-align: center;
      font-size: 12px;
    }
    
    .advanced-link:hover { background: rgba(0,255,136,0.2); }
  </style>
</head>
<body>
  <div id="container"></div>
  
  <div class="controls">
    <h1>🌐 WikiLeaks Network Map</h1>
    
    <h2>Dataset</h2>
    <div class="btn-group">
      <button class="btn active" onclick="loadDataset('cablegate')">Cablegate</button>
      <button class="btn" onclick="loadDataset('dnc')">DNC Emails</button>
      <button class="btn" onclick="loadDataset('vault7')">CIA Vault7</button>
    </div>
    
    <h2>View Mode</h2>
    <div class="btn-group">
      <button class="btn active" onclick="setViewMode('3d')">3D</button>
      <button class="btn" onclick="setViewMode('2d')">2D</button>
    </div>
    
    <div class="search-box">
      <input type="text" id="search" placeholder="Search nodes..." oninput="searchNodes(this.value)">
    </div>
    
    <div class="stats" id="stats">Loading...</div>
    
    <a href="advanced.html" class="advanced-link">📊 Open Advanced Cablegate Explorer →</a>
  </div>
  
  <div class="info-panel" id="info-panel">
    <span class="close" onclick="closeInfo()">×</span>
    <h3 id="info-title">Node Info</h3>
    <p id="info-content"></p>
    <a href="#" class="doc-link" id="doc-link" target="_blank">🔍 View Documents on WikiLeaks</a>
  </div>
  
  <div class="legend" id="legend"></div>

  <script src="https://unpkg.com/3d-force-graph@1"></script>
  <script>
    let Graph;
    let currentDataset = 'cablegate';
    let graphData = {};
    let detailedData = {};
    
    const colors = {
      cablegate: {
        node: (node) => {
          const val = node.val || 1;
          if (val > 1000) return '#ff4444';
          if (val > 500) return '#ffaa00';
          return '#44ff88';
        },
        link: (link) => {
          const val = link.value || 1;
          if (val > 100) return 'rgba(255,68,68,0.6)';
          if (val > 50) return 'rgba(255,170,0,0.4)';
          return 'rgba(68,255,136,0.2)';
        }
      },
      dnc: {
        node: (node) => {
          const name = node.name || '';
          if (name.includes('dnc')) return '#00aaff';
          if (name.includes('politico') || name.includes('washpost') || name.includes('nbc')) return '#ff6600';
          return '#44ff88';
        },
        link: () => 'rgba(100,200,255,0.2)'
      },
      vault7: {
        node: (node) => {
          const type = node.type || '';
          if (type === 'project') {
            const cat = node.category || '';
            if (cat === 'framework' || cat === 'infrastructure') return '#ff4444';
            if (cat === 'implant') return '#ff6600';
            if (cat === 'exploit') return '#ffaa00';
            return '#00ff88';
          }
          if (type === 'organization') return '#00aaff';
          if (type === 'user') return '#aa66ff';
          return '#44ff88';
        },
        link: (link) => {
          const type = link.type || '';
          if (type === 'developed_by') return 'rgba(0,170,255,0.5)';
          if (type === 'related_to') return 'rgba(255,102,0,0.4)';
          if (type === 'contributed_to') return 'rgba(170,102,255,0.3)';
          return 'rgba(68,255,136,0.2)';
        }
      }
    };
    
    async function loadDataset(name) {
      currentDataset = name;
      
      document.querySelectorAll('.btn-group:first-of-type .btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      try {
        if (name === 'cablegate') {
          const [graphRes, detailRes] = await Promise.all([
            fetch('cablegate_embassies.json'),
            fetch('cablegate_detailed.json')
          ]);
          graphData = await graphRes.json();
          detailedData = await detailRes.json();
          
          document.getElementById('stats').innerHTML = `
            <div>Nodes: <span>${graphData.nodes.length}</span> embassies</div>
            <div>Edges: <span>${graphData.links.length}</span> connections</div>
            <div>Total: <span>251,287</span> diplomatic cables</div>
          `;
          
          document.getElementById('legend').innerHTML = `
            <strong>Embassy Activity</strong>
            <div class="legend-item"><div class="legend-color" style="background:#ff4444"></div> High (1000+ refs)</div>
            <div class="legend-item"><div class="legend-color" style="background:#ffaa00"></div> Medium (500+)</div>
            <div class="legend-item"><div class="legend-color" style="background:#44ff88"></div> Normal</div>
          `;
        } else if (name === 'vault7') {
          const response = await fetch('vault7_network.json');
          const vault7Data = await response.json();
          graphData = { nodes: vault7Data.nodes, links: vault7Data.links };
          detailedData = vault7Data;
          
          document.getElementById('stats').innerHTML = `
            <div>Nodes: <span>${vault7Data.nodes.length}</span> (projects/orgs/users)</div>
            <div>Links: <span>${vault7Data.links.length}</span> relationships</div>
            <div>Dataset: <span>CIA Hacking Tools (2017)</span></div>
          `;
          
          document.getElementById('legend').innerHTML = `
            <strong>Node Types</strong>
            <div class="legend-item"><div class="legend-color" style="background:#ff4444"></div> Frameworks</div>
            <div class="legend-item"><div class="legend-color" style="background:#ff6600"></div> Implants</div>
            <div class="legend-item"><div class="legend-color" style="background:#00aaff"></div> Organizations</div>
            <div class="legend-item"><div class="legend-color" style="background:#aa66ff"></div> Users</div>
          `;
        } else {
          const response = await fetch('dnc_graph.json');
          graphData = await response.json();
          detailedData = {};
          
          document.getElementById('stats').innerHTML = `
            <div>Nodes: <span>${graphData.nodes.length}</span> email addresses</div>
            <div>Edges: <span>${graphData.links.length}</span> connections</div>
            <div>Dataset: <span>DNC Email Leak</span></div>
          `;
          
          document.getElementById('legend').innerHTML = `
            <strong>Email Domains</strong>
            <div class="legend-item"><div class="legend-color" style="background:#00aaff"></div> DNC Internal</div>
            <div class="legend-item"><div class="legend-color" style="background:#ff6600"></div> Media</div>
            <div class="legend-item"><div class="legend-color" style="background:#44ff88"></div> External</div>
          `;
        }
        
        renderGraph();
      } catch (e) {
        console.error('Failed to load dataset:', e);
        document.getElementById('stats').innerHTML = 'Error loading data';
      }
    }
    
    function renderGraph() {
      const container = document.getElementById('container');
      container.innerHTML = '';
      
      const colorScheme = colors[currentDataset];
      
      Graph = ForceGraph3D()(container)
        .graphData(graphData)
        .nodeLabel(node => `
          <div style="background:rgba(0,0,0,0.9);padding:10px 15px;border-radius:8px;">
            <strong style="color:#00ff88;font-size:14px;">${node.name || node.id}</strong>
            ${node.val ? '<br><span style="color:#aaa">Connections: ' + node.val + '</span>' : ''}
            <br><span style="color:#666;font-size:11px;">Click for documents</span>
          </div>
        `)
        .nodeColor(colorScheme.node)
        .nodeVal(node => Math.sqrt(node.val || 1) * 2)
        .nodeOpacity(0.9)
        .linkColor(colorScheme.link)
        .linkWidth(link => Math.sqrt(link.value || 1) * 0.3)
        .linkOpacity(0.6)
        .backgroundColor('#0a0a0a')
        .onNodeClick(node => showNodeInfo(node))
        .onBackgroundClick(() => closeInfo());
        
      if (currentDataset === 'cablegate' || currentDataset === 'vault7') {
        Graph
          .linkDirectionalParticles(2)
          .linkDirectionalParticleWidth(1.5)
          .linkDirectionalParticleSpeed(0.005);
      }
    }
    
    function showNodeInfo(node) {
      const panel = document.getElementById('info-panel');
      const title = document.getElementById('info-title');
      const content = document.getElementById('info-content');
      const docLink = document.getElementById('doc-link');
      
      // Zoom to node
      const distance = 200;
      const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
      Graph.cameraPosition(
        { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
        node,
        1000
      );
      
      if (currentDataset === 'cablegate') {
        const detailed = detailedData.nodes?.find(n => n.id === node.id);
        title.textContent = (node.name || node.id) + ' Embassy';
        
        const connections = graphData.links.filter(l => 
          l.source === node.id || l.target === node.id ||
          l.source.id === node.id || l.target.id === node.id
        ).length;
        
        content.innerHTML = `
          <strong>Total Cables:</strong> ${detailed?.total?.toLocaleString() || node.val || 'N/A'}<br>
          <strong>Network Connections:</strong> ${connections} embassies<br>
          ${detailed?.sample_cables?.length ? `<strong>Sample:</strong> ${detailed.sample_cables[0].subject?.substring(0, 100)}...` : ''}
        `;
        
        docLink.href = detailed?.search_url || `https://wikileaks.org/plusd/?qproject[]=cg&qforigin[]=${node.id}#result`;
        docLink.textContent = '🔍 Search All ' + (node.name || node.id) + ' Cables';
      } else if (currentDataset === 'vault7') {
        // CIA Vault7
        title.textContent = node.id;
        
        const connections = graphData.links.filter(l => 
          l.source === node.id || l.target === node.id ||
          l.source.id === node.id || l.target.id === node.id
        ).length;
        
        if (node.type === 'project') {
          content.innerHTML = `
            <strong>Type:</strong> ${node.category || 'Unknown'}<br>
            <strong>Division:</strong> ${node.division || 'Unknown'}<br>
            <strong>Targets:</strong> ${(node.targets || []).join(', ') || 'Unknown'}<br>
            <strong>Description:</strong> ${node.description || 'No description'}<br>
            <strong>Mentions:</strong> ${node.mentions || 0}
          `;
          docLink.href = `https://wikileaks.org/ciav7p1/?q=${encodeURIComponent(node.id)}`;
          docLink.textContent = '🔍 Search ' + node.id + ' on WikiLeaks Vault7';
        } else if (node.type === 'organization') {
          content.innerHTML = `
            <strong>Full Name:</strong> ${node.full_name || node.id}<br>
            <strong>Type:</strong> ${node.org_type || 'CIA Division'}<br>
            <strong>Connections:</strong> ${connections} links
          `;
          docLink.href = `https://wikileaks.org/ciav7p1/?q=${encodeURIComponent(node.id)}`;
          docLink.textContent = '🔍 Search ' + node.id + ' on WikiLeaks';
        } else {
          content.innerHTML = `
            <strong>Type:</strong> User/Developer<br>
            <strong>Activity:</strong> ${node.file_count || 0} files<br>
            <strong>Connections:</strong> ${connections} links
          `;
          docLink.href = `https://wikileaks.org/ciav7p1/`;
          docLink.textContent = '🔍 Browse Vault7 on WikiLeaks';
        }
      } else {
        // DNC emails
        const email = node.name || node.id;
        title.textContent = email;
        
        const connections = graphData.links.filter(l => 
          l.source === node.id || l.target === node.id ||
          l.source.id === node.id || l.target.id === node.id
        ).length;
        
        content.innerHTML = `
          <strong>Email Connections:</strong> ${connections}<br>
          <strong>Type:</strong> ${email.includes('dnc') ? 'DNC Internal' : email.includes('politico') || email.includes('washpost') ? 'Media' : 'External'}
        `;
        
        // Search WikiLeaks DNC archive
        const searchTerm = encodeURIComponent(email.split('@')[0]);
        docLink.href = `https://wikileaks.org/dnc-emails/?q=${searchTerm}&mfrom=&mto=&title=&notitle=&date_from=&date_to=&nofrom=&noto=&count=50&sort=0#searchresult`;
        docLink.textContent = '🔍 Search Emails on WikiLeaks';
      }
      
      panel.style.display = 'block';
    }
    
    function closeInfo() {
      document.getElementById('info-panel').style.display = 'none';
    }
    
    function setViewMode(mode) {
      document.querySelectorAll('.btn-group:nth-of-type(2) .btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      Graph.numDimensions(mode === '2d' ? 2 : 3);
    }
    
    function searchNodes(query) {
      if (!query) {
        Graph.nodeColor(colors[currentDataset].node);
        return;
      }
      
      query = query.toLowerCase();
      Graph.nodeColor(node => {
        const name = (node.name || node.id).toLowerCase();
        return name.includes(query) ? '#ffffff' : colors[currentDataset].node(node);
      });
    }
    
    loadDataset('cablegate');
  </script>
</body>
</html>
